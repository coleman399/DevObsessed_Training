<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Welcome Flow — Dark Auth Concepts</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  html, body { margin:0; padding:0; height:100%; background:#f0eee9; }
  body { font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif; }
  #root { width:100%; height:100%; }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body style="background-color: rgb(31, 31, 31)">
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="backgrounds.jsx"></script>
<script type="text/babel" src="auth-app.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#22d3a8",
  "fontPair": "geist",
  "authLayout": "split",
  "welcomeLayout": "split",
  "density": "comfy",
  "greetingCopy": "Welcome,",
  "brandName": "Lumen"
}/*EDITMODE-END*/;

// Each artboard hosts a different background variant. The Tweaks panel
// globally affects accent, fonts, layout, density and copy across all three.
const VARIANTS = [
  { id: 'aurora', label: 'A · Aurora',    bg: 'aurora',
    blurb: 'Drifting gradient blobs behind frosted glass.' },
  { id: 'mesh',   label: 'B · Mesh + Grain', bg: 'mesh',
    blurb: 'Pastel gradient mesh, film grain, subtle grid.' },
  { id: 'orbs',   label: 'C · Orbs',      bg: 'orbs',
    blurb: 'Floating glowing particles + parallax grid.' },
];

const ART_W = 1200;
const ART_H = 780;

function Root(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <>
      <DesignCanvas>
        <DCSection
          id="welcome-flow"
          title="Welcome Flow · Dark"
          subtitle="Three takes on a glassy login → welcome moment. Each artboard is fully interactive — try signing in (use any email · 6+ char password)."
        >
          {VARIANTS.map(v => (
            <DCArtboard key={v.id} id={v.id} label={v.label}
                        width={ART_W} height={ART_H}>
              <AuthApp variant={v.id}
                       brandName={t.brandName}
                       tweaks={{
                         accent: t.accent,
                         fontPair: t.fontPair,
                         authLayout: t.authLayout,
                         welcomeLayout: t.welcomeLayout,
                         density: t.density,
                         greetingCopy: t.greetingCopy,
                         bgTreatment: v.bg,
                       }} />
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Color"/>
        <TweakColor label="Accent" value={t.accent}
          options={['#22d3a8', '#7c5cff', '#ff5b2e', '#d4ff3a', '#5ab3ff', '#f0f0eb']}
          onChange={v => setTweak('accent', v)} />

        <TweakSection label="Typography"/>
        <TweakRadio label="Font pair" value={t.fontPair}
          options={[
            {value:'geist',   label:'Geist'},
            {value:'jakarta', label:'Jakarta'},
            {value:'manrope', label:'Manrope'},
          ]}
          onChange={v => setTweak('fontPair', v)} />

        <TweakSection label="Auth screen"/>
        <TweakRadio label="Layout" value={t.authLayout}
          options={[
            {value:'card',    label:'Card'},
            {value:'split',   label:'Split'},
            {value:'minimal', label:'Minimal'},
          ]}
          onChange={v => setTweak('authLayout', v)} />
        <TweakRadio label="Density" value={t.density}
          options={[
            {value:'compact', label:'Compact'},
            {value:'regular', label:'Regular'},
            {value:'comfy',   label:'Comfy'},
          ]}
          onChange={v => setTweak('density', v)} />

        <TweakSection label="Welcome screen"/>
        <TweakRadio label="Layout" value={t.welcomeLayout}
          options={[
            {value:'centered', label:'Centered'},
            {value:'minimal',  label:'Minimal'},
            {value:'split',    label:'Split'},
          ]}
          onChange={v => setTweak('welcomeLayout', v)} />
        <TweakText label="Greeting" value={t.greetingCopy}
          onChange={v => setTweak('greetingCopy', v)} />

        <TweakSection label="Brand"/>
        <TweakText label="Name" value={t.brandName}
          onChange={v => setTweak('brandName', v)} />
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root/>);
</script>
</body>
</html>
