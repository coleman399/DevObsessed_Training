<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Welcome + Chat — Placement Exploration</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  html, body { margin:0; padding:0; height:100%; }
  body { font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
         background-color: rgb(31, 31, 31); }
  #root { width:100%; height:100%; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="backgrounds.jsx"></script>
<script type="text/babel" src="welcome-chat.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#22d3a8",
  "userName": "Dillon Smith",
  "greetingCopy": "Welcome,"
}/*EDITMODE-END*/;

const PLACEMENTS = [
  { id: 'below',  label: 'A · Chat below greeting',
    blurb: 'Greeting reveals first. Chat slides in beneath it as a quiet conversation surface. "Today" stays in the right column.' },
  { id: 'beside', label: 'B · Chat as middle column',
    blurb: 'Three-column layout — name on the left, glassy chat panel anchored center, "Today" on the right.' },
  { id: 'dock',   label: 'C · Bottom-docked composer',
    blurb: 'Greeting takes center. "Today" floats top-right. A wide chat composer docks at the bottom and grows upward as the conversation builds.' },
];

const ART_W = 1200;
const ART_H = 780;

function Root(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <>
      <DesignCanvas>
        <DCSection
          id="welcome-chat"
          title="Welcome + Chat · Placement"
          subtitle="Three takes on where the Nova chatbot lives on the post-login welcome screen. All three are fully interactive — try sending a message. Replies are real (Claude Haiku, 1-2 sentences)."
        >
          {PLACEMENTS.map(p => (
            <DCArtboard key={p.id} id={p.id} label={p.label}
                        width={ART_W} height={ART_H}>
              <WelcomeChat
                placement={p.id}
                name={t.userName}
                accent={t.accent}
                greetingCopy={t.greetingCopy}
              />
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Color"/>
        <TweakColor label="Accent" value={t.accent}
          options={['#22d3a8', '#7c5cff', '#ff5b2e', '#d4ff3a', '#5ab3ff', '#f0f0eb']}
          onChange={v => setTweak('accent', v)} />

        <TweakSection label="Greeting"/>
        <TweakText label="Name" value={t.userName}
          onChange={v => setTweak('userName', v)} />
        <TweakText label="Greeting" value={t.greetingCopy}
          onChange={v => setTweak('greetingCopy', v)} />
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root/>);
</script>
</body>
</html>
